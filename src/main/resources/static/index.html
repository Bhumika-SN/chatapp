<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ChatApp</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        :root{--or:#E8622A;--or-l:#F0845A;--or-d:#C94E1A;--bg1:#1A1210;--bg2:#251A16;--bg3:#31211A;--bg4:#3D2920;--bd:#4A3028;--tp:#F0E6E0;--ts:#A08070;--mine:#3D2318;--other:#251A16;--sh:rgba(0,0,0,.5);}
        [data-theme=light]{--bg1:#FFF5F0;--bg2:#fff;--bg3:#FDE8DC;--bg4:#FDDDD0;--bd:#F0C4B0;--tp:#2A1510;--ts:#886050;--mine:#FFE0D0;--other:#fff;--sh:rgba(200,100,50,.12);}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:var(--bg1);color:var(--tp);height:100vh;display:flex;align-items:center;justify-content:center;}

        /* AUTH */
        #auth-screen{background:var(--bg2);border-radius:18px;padding:40px;width:380px;box-shadow:0 12px 40px var(--sh);}
        .a-logo{text-align:center;margin-bottom:24px;}
        .a-icon{width:56px;height:56px;background:var(--or);border-radius:16px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;}
        .a-icon svg{width:28px;height:28px;fill:#fff;}
        .a-logo h1{font-size:22px;font-weight:700;}
        .a-logo p{color:var(--ts);font-size:13px;margin-top:4px;}
        .a-tabs{display:flex;background:var(--bg3);border-radius:10px;padding:4px;margin-bottom:20px;}
        .a-tab{flex:1;padding:9px;border:none;background:none;color:var(--ts);border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:all .2s;}
        .a-tab.active{background:var(--bg2);color:var(--tp);box-shadow:0 2px 6px var(--sh);}
        .a-field{position:relative;margin-bottom:12px;}
        .a-field input{width:100%;padding:12px 16px;border:1.5px solid var(--bd);border-radius:10px;background:var(--bg3);color:var(--tp);font-size:14px;outline:none;transition:border-color .2s;}
        .a-field input:focus{border-color:var(--or);}
        .a-field label{position:absolute;top:-8px;left:12px;background:var(--bg2);padding:0 4px;font-size:11px;color:var(--ts);}
        .a-btn{width:100%;padding:12px;border:none;border-radius:10px;background:var(--or);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;transition:background .2s;}
        .a-btn:hover{background:var(--or-l);}
        .g-btn{width:100%;padding:11px;border:1.5px solid var(--bd);border-radius:10px;background:var(--bg3);color:var(--tp);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;}
        .g-btn:hover{border-color:var(--or);}
        .g-btn svg{width:20px;height:20px;}
        .divider{display:flex;align-items:center;gap:8px;margin:12px 0;color:var(--ts);font-size:12px;}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bd);}
        .a-err{color:#ff7055;font-size:13px;margin-bottom:10px;padding:8px;background:rgba(232,98,42,.12);border-radius:8px;display:none;text-align:center;}

        /* APP */
        #app{display:none;width:1160px;height:700px;background:var(--bg1);border-radius:18px;overflow:hidden;flex-direction:row;box-shadow:0 12px 48px var(--sh);}

        /* SIDEBAR */
        #sidebar{width:320px;background:var(--bg2);display:flex;flex-direction:column;border-right:1px solid var(--bd);flex-shrink:0;}
        #sb-top{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);}
        .sb-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;cursor:pointer;overflow:hidden;flex-shrink:0;}
        .sb-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
        .sb-acts{display:flex;gap:4px;}
        .ib{width:34px;height:34px;border:none;background:none;color:var(--ts);cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;}
        .ib:hover{background:var(--bg3);color:var(--or);}
        .ib svg{width:19px;height:19px;}
        #sb-search{padding:7px 12px;border-bottom:1px solid var(--bd);}
        .sw{position:relative;}
        .sw input{width:100%;padding:8px 14px 8px 34px;border:none;border-radius:8px;background:var(--bg3);color:var(--tp);font-size:13px;outline:none;}
        .sw svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:15px;height:15px;fill:var(--ts);}
        #room-list{flex:1;overflow-y:auto;}
        .ri{padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid var(--bd);transition:background .15s;}
        .ri:hover,.ri.active{background:var(--bg3);}
        .ri.active{border-left:3px solid var(--or);}
        .r-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:17px;flex-shrink:0;position:relative;}
        .lock-badge{position:absolute;bottom:-2px;right:-2px;background:var(--or);border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;}
        .r-meta{flex:1;min-width:0;}
        .r-nr{display:flex;justify-content:space-between;align-items:center;}
        .r-name{font-size:14px;font-weight:500;color:var(--tp);}
        .r-time{font-size:10px;color:var(--ts);}
        .r-prev{font-size:12px;color:var(--ts);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;max-width:180px;}
        #add-room{padding:9px 12px;border-top:1px solid var(--bd);display:flex;gap:7px;}
        #add-room input{flex:1;padding:8px 11px;border:1.5px solid var(--bd);border-radius:9px;background:var(--bg3);color:var(--tp);font-size:13px;outline:none;}
        #add-room input:focus{border-color:var(--or);}
        #add-room button{padding:8px 14px;border:none;border-radius:9px;background:var(--or);color:#fff;cursor:pointer;font-size:18px;font-weight:bold;}

        /* NAV TABS — bottom of sidebar */
        #sb-nav{display:flex;border-top:1px solid var(--bd);}
        .nav-tab{flex:1;padding:10px 4px;border:none;background:none;color:var(--ts);cursor:pointer;font-size:10px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s;}
        .nav-tab svg{width:18px;height:18px;}
        .nav-tab.active,.nav-tab:hover{color:var(--or);}

        /* CHAT */
        #chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
        #no-room{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--ts);}
        #no-room .nr-i{width:68px;height:68px;background:var(--bg3);border-radius:50%;display:flex;align-items:center;justify-content:center;}
        #no-room .nr-i svg{width:34px;height:34px;fill:var(--or);opacity:.7;}
        #ch-header{padding:11px 18px;background:var(--bg2);display:none;align-items:center;gap:12px;border-bottom:1px solid var(--bd);}
        .ch-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;}
        .ch-info .ch-t{font-size:15px;font-weight:600;}
        .ch-info .ch-s{font-size:12px;color:var(--ts);}
        .ch-acts{margin-left:auto;display:flex;gap:3px;}
        #sel-bar{padding:8px 16px;background:var(--or);display:none;align-items:center;gap:10px;color:#fff;font-size:13px;font-weight:600;}
        #sel-bar button{padding:5px 12px;border:none;border-radius:7px;background:rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:12px;}
        #sel-bar button.danger{background:rgba(255,80,60,.5);}
        #smsg-bar{padding:5px 14px;background:var(--bg3);display:none;align-items:center;gap:8px;border-bottom:1px solid var(--bd);}
        #smsg-bar input{flex:1;padding:7px 11px;border:none;border-radius:7px;background:var(--bg2);color:var(--tp);font-size:13px;outline:none;}
        #msgs{flex:1;overflow-y:auto;padding:10px 7%;display:flex;flex-direction:column;gap:2px;}
        .mb{max-width:62%;padding:7px 12px 4px;border-radius:13px;font-size:14px;line-height:1.55;position:relative;word-break:break-word;}
        .mb.mine{background:var(--mine);align-self:flex-end;border-bottom-right-radius:3px;border:1px solid var(--bd);}
        .mb.other{background:var(--other);align-self:flex-start;border-bottom-left-radius:3px;border:1px solid var(--bd);}
        .mb.starred{border-color:var(--or)!important;}
        .mb.selecting{cursor:pointer;}
        .mb.selected{outline:2px solid var(--or);}
        .msn{font-size:11px;font-weight:700;color:var(--or);margin-bottom:2px;}
        .mdel{color:var(--ts);font-style:italic;font-size:13px;}
        .mft{display:flex;align-items:center;justify-content:flex-end;gap:3px;margin-top:2px;}
        .mt{font-size:10px;color:var(--ts);}
        .med{font-size:10px;color:var(--ts);font-style:italic;}
        .mtk{font-size:11px;color:var(--ts);}
        .tks{color:var(--or);}
        .mrc{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px;}
        .rchip{background:var(--bg3);border-radius:10px;padding:2px 6px;font-size:12px;cursor:pointer;border:1px solid var(--bd);}
        .ma{display:none;position:absolute;right:-110px;top:0;background:var(--bg2);border-radius:9px;box-shadow:0 6px 20px var(--sh);z-index:20;padding:4px;border:1px solid var(--bd);min-width:108px;}
        .mb:hover .ma{display:flex;flex-direction:column;}
        .mab{padding:6px 11px;font-size:12px;color:var(--tp);cursor:pointer;border-radius:5px;white-space:nowrap;}
        .mab:hover{background:var(--bg3);color:var(--or);}
        .mab.danger{color:#ff7055;}
        .rp{background:var(--bg3);border-left:3px solid var(--or);padding:3px 9px;border-radius:3px;margin-bottom:5px;font-size:11px;color:var(--ts);}
        .typ{padding:5px 7%;font-size:12px;color:var(--ts);font-style:italic;min-height:24px;}

        /* File bubbles */
        .img-bubble{max-width:220px;border-radius:10px;cursor:pointer;}
        .audio-bubble{width:220px;}
        .file-bubble{display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg3);border-radius:8px;cursor:pointer;}
        .file-bubble svg{width:24px;height:24px;fill:var(--or);flex-shrink:0;}
        .snap-bubble{position:relative;cursor:pointer;}
        .snap-overlay{position:absolute;inset:0;background:rgba(232,98,42,.85);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;}

        /* INPUT */
        #reply-bar{padding:7px 14px;background:var(--bg3);display:none;align-items:center;gap:9px;border-top:1px solid var(--bd);}
        #reply-bar .ri2{flex:1;font-size:12px;color:var(--ts);}
        #reply-bar button{background:none;border:none;color:var(--ts);cursor:pointer;font-size:17px;}
        #inp-area{padding:9px 14px;background:var(--bg2);display:none;align-items:flex-end;gap:8px;border-top:1px solid var(--bd);}
        .ew{position:relative;}
        #ep{position:absolute;bottom:48px;left:0;background:var(--bg2);border:1px solid var(--bd);border-radius:13px;padding:9px;display:none;z-index:100;width:280px;box-shadow:0 10px 28px var(--sh);}
        #ep.open{display:block;}
        .egrid{display:flex;flex-wrap:wrap;gap:3px;max-height:170px;overflow-y:auto;}
        .eb{font-size:21px;cursor:pointer;padding:3px;border-radius:6px;transition:background .15s;}
        .eb:hover{background:var(--bg3);}
        #mi{flex:1;padding:10px 14px;border:1.5px solid var(--bd);border-radius:22px;background:var(--bg3);color:var(--tp);font-size:14px;outline:none;resize:none;max-height:110px;font-family:inherit;line-height:1.4;}
        #mi:focus{border-color:var(--or);}
        .sbtn{width:44px;height:44px;border:none;border-radius:50%;background:var(--or);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,transform .1s;}
        .sbtn:hover{background:var(--or-l);}
        .sbtn svg{width:19px;height:19px;fill:#fff;}
        .att-btn{width:36px;height:36px;border:none;background:none;color:var(--ts);cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;}
        .att-btn:hover{background:var(--bg3);color:var(--or);}
        .att-btn svg{width:20px;height:20px;}
        #rec-btn{background:none;border:none;color:var(--ts);cursor:pointer;padding:6px;border-radius:50%;transition:all .2s;}
        #rec-btn.recording{color:#ff5555;animation:pulse 1s infinite;}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

        /* VAULT PANEL */
        #vault{display:none;flex:1;flex-direction:column;background:var(--bg1);overflow:hidden;}
        #vault.open{display:flex;}
        #vt-header{padding:14px 18px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px;}
        #vt-header h2{font-size:17px;font-weight:700;flex:1;}
        .vt-tabs{display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid var(--bd);background:var(--bg2);}
        .vt-tab{padding:7px 14px;border:none;border-radius:8px;background:var(--bg3);color:var(--ts);cursor:pointer;font-size:13px;transition:all .2s;}
        .vt-tab.active{background:var(--or);color:#fff;}
        #vt-content{flex:1;overflow-y:auto;padding:14px;}
        .vt-add{display:flex;gap:7px;margin-bottom:14px;}
        .vt-add input,.vt-add textarea{flex:1;padding:9px 12px;border:1.5px solid var(--bd);border-radius:9px;background:var(--bg3);color:var(--tp);font-size:13px;outline:none;font-family:inherit;}
        .vt-add input:focus,.vt-add textarea:focus{border-color:var(--or);}
        .vt-add button{padding:9px 14px;border:none;border-radius:9px;background:var(--or);color:#fff;cursor:pointer;font-size:13px;white-space:nowrap;}
        .vcard{background:var(--bg2);border-radius:10px;padding:12px 14px;margin-bottom:9px;border:1px solid var(--bd);display:flex;align-items:flex-start;gap:10px;}
        .vcard.done{opacity:.5;}
        .vc-icon{width:36px;height:36px;border-radius:9px;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;}
        .vc-body{flex:1;min-width:0;}
        .vc-title{font-size:14px;font-weight:600;color:var(--tp);margin-bottom:3px;}
        .vc-sub{font-size:12px;color:var(--ts);line-height:1.5;}
        .vc-acts{display:flex;gap:5px;margin-top:6px;}
        .vc-btn{padding:4px 10px;border:none;border-radius:6px;background:var(--bg3);color:var(--ts);cursor:pointer;font-size:11px;transition:all .15s;}
        .vc-btn:hover{background:var(--or);color:#fff;}
        .vc-del{background:none;border:none;color:var(--ts);cursor:pointer;padding:4px;border-radius:5px;font-size:14px;margin-left:auto;}
        .vc-del:hover{color:#ff7055;}

        /* MODALS */
        .modal-bg{display:none;position:absolute;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center;}
        .modal-bg.open{display:flex;}
        .modal{background:var(--bg2);border-radius:16px;padding:26px;width:360px;border:1px solid var(--bd);box-shadow:0 12px 40px var(--sh);}
        .modal h3{color:var(--or);margin-bottom:14px;font-size:16px;}
        .modal input{width:100%;padding:11px 14px;border:1.5px solid var(--bd);border-radius:9px;background:var(--bg3);color:var(--tp);font-size:14px;outline:none;margin-bottom:12px;}
        .modal input:focus{border-color:var(--or);}
        .modal-btns{display:flex;gap:8px;}
        .modal-btns button{flex:1;padding:11px;border:none;border-radius:9px;cursor:pointer;font-size:14px;font-weight:600;}
        .mb-ok{background:var(--or);color:#fff;}
        .mb-ok:hover{background:var(--or-l);}
        .mb-cancel{background:var(--bg3);color:var(--tp);}

        /* AI modal */
        #ai-modal{display:none;position:absolute;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;}
        #ai-modal.open{display:flex;}
        .ai-box{background:var(--bg2);border-radius:16px;padding:26px;width:420px;border:1px solid var(--bd);}
        .ai-box h3{color:var(--or);margin-bottom:12px;font-size:16px;}
        .ai-box p{color:var(--tp);line-height:1.7;font-size:14px;white-space:pre-wrap;}
        .ai-close{margin-top:16px;width:100%;padding:10px;border:none;border-radius:9px;background:var(--or);color:#fff;cursor:pointer;font-size:14px;font-weight:600;}

        /* Profile panel */
        #pp{display:none;position:absolute;top:0;left:0;width:320px;height:100%;background:var(--bg2);z-index:50;flex-direction:column;border-right:1px solid var(--bd);}
        #pp.open{display:flex;}
        .pp-hdr{padding:56px 22px 22px;background:var(--or);color:#fff;}
        .pp-back{position:absolute;top:14px;left:14px;background:none;border:none;color:#fff;cursor:pointer;font-size:21px;}
        .pp-av{width:76px;height:76px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:#fff;overflow:hidden;}
        .pp-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
        .pp-name{text-align:center;font-size:19px;font-weight:700;}
        .pp-body{padding:18px;flex:1;overflow-y:auto;}
        .pp-lbl{font-size:10px;color:var(--or);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
        .pp-fld{margin-bottom:18px;}
        .pp-val{font-size:14px;color:var(--tp);padding:6px 0;border-bottom:1px solid var(--bd);}
        .pp-inp{width:100%;padding:7px 0;border:none;border-bottom:1.5px solid var(--or);background:none;color:var(--tp);font-size:14px;outline:none;}
        .pp-save{width:100%;padding:11px;border:none;border-radius:9px;background:var(--or);color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:14px;}
        .tr{display:flex;gap:7px;margin-top:5px;}
        .tb{flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--bd);background:var(--bg3);color:var(--tp);cursor:pointer;font-size:12px;}
        .tb:hover{border-color:var(--or);}

        /* Snap viewer */
        #snap-view{display:none;position:absolute;inset:0;background:#000;z-index:300;align-items:center;justify-content:center;flex-direction:column;}
        #snap-view.open{display:flex;}
        #snap-img{max-width:90%;max-height:80vh;border-radius:12px;}
        #snap-close{margin-top:16px;padding:10px 28px;border:none;border-radius:9px;background:var(--or);color:#fff;cursor:pointer;font-size:14px;}

        ::-webkit-scrollbar{width:4px;}
        ::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}
    </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
    <div class="a-logo">
        <div class="a-icon"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
        <h1>ChatApp</h1><p>Connect with anyone, anywhere</p>
    </div>
    <div class="a-tabs">
        <button class="a-tab active" id="tl" onclick="swTab('login')">Login</button>
        <button class="a-tab" id="tr2" onclick="swTab('register')">Register</button>
    </div>
    <div id="aerr" class="a-err"></div>
    <div class="a-field"><label>Username</label><input id="au" type="text" placeholder="Username" onkeydown="if(event.key==='Enter')doAuth()"/></div>
    <div class="a-field"><label>Password</label><input id="ap" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')doAuth()"/></div>
    <button class="a-btn" id="ab" onclick="doAuth()">Login</button>
    <div class="divider">or</div>
    <button class="g-btn" onclick="window.location.href='/oauth2/authorization/google'">
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
    </button>
</div>

<!-- APP -->
<div id="app">

    <!-- MODALS -->
    <div class="modal-bg" id="lock-modal">
        <div class="modal">
            <h3>🔐 Lock this chat</h3>
            <input id="lock-pw" type="password" placeholder="Set a password (leave empty to remove lock)"/>
            <div class="modal-btns">
                <button class="mb-cancel" onclick="closeLockModal()">Cancel</button>
                <button class="mb-ok" onclick="saveLock()">Save</button>
            </div>
        </div>
    </div>

    <div class="modal-bg" id="unlock-modal">
        <div class="modal">
            <h3>🔐 This chat is locked</h3>
            <input id="unlock-pw" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')doUnlock()"/>
            <div class="modal-btns">
                <button class="mb-cancel" onclick="closeUnlockModal()">Cancel</button>
                <button class="mb-ok" onclick="doUnlock()">Unlock</button>
            </div>
        </div>
    </div>

    <div id="ai-modal">
        <div class="ai-box">
            <h3>🤖 AI Chat Summary</h3>
            <p id="ai-text">Generating...</p>
            <button class="ai-close" onclick="document.getElementById('ai-modal').classList.remove('open')">Close</button>
        </div>
    </div>

    <div id="snap-view">
        <img id="snap-img" src="" alt="snap"/>
        <button id="snap-close" onclick="closeSnap()">✓ Seen — close</button>
    </div>

    <!-- PROFILE -->
    <div id="pp">
        <button class="pp-back" onclick="document.getElementById('pp').classList.remove('open')">←</button>
        <div class="pp-hdr">
            <div class="pp-av" id="pp-av"></div>
            <div class="pp-name" id="pp-nm"></div>
        </div>
        <div class="pp-body">
            <div class="pp-fld"><div class="pp-lbl">Username</div><div class="pp-val" id="pp-un"></div></div>
            <div class="pp-fld"><div class="pp-lbl">Status</div><input class="pp-inp" id="pp-st" placeholder="What's on your mind?"/></div>
            <div class="pp-fld">
                <div class="pp-lbl">Theme</div>
                <div class="tr">
                    <button class="tb" onclick="applyTheme('dark')">🌙 Dark</button>
                    <button class="tb" onclick="applyTheme('light')">☀️ Light</button>
                </div>
            </div>
            <button class="pp-save" onclick="saveProfile()">Save</button>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <div id="sb-top">
            <div class="sb-av" id="my-av" onclick="openProfile()"></div>
            <div class="sb-acts">
                <button class="ib" onclick="toggleTheme()" title="Theme"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg></button>
                <button class="ib" onclick="logout()" title="Logout"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg></button>
            </div>
        </div>
        <div id="sb-search"><div class="sw">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" placeholder="Search chats..." oninput="filterRooms(this.value)"/>
        </div></div>
        <div id="room-list"></div>
        <div id="add-room">
            <input id="nr-inp" placeholder="New room..." onkeydown="if(event.key==='Enter')createRoom()"/>
            <button onclick="createRoom()">+</button>
        </div>
        <div id="sb-nav">
            <button class="nav-tab active" id="nav-chat" onclick="switchNav('chat')">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>Chats
            </button>
            <button class="nav-tab" id="nav-vault" onclick="switchNav('vault')">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>Vault
            </button>
        </div>
    </div>

    <!-- CHAT AREA -->
    <div id="chat-area">
        <div id="no-room">
            <div class="nr-i"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
            <span style="font-size:15px;font-weight:500;">Select a chat</span>
            <span style="font-size:12px;">Your messages are private 🔒</span>
        </div>
        <div id="ch-header">
            <div class="ch-av" id="ch-av"></div>
            <div class="ch-info"><div class="ch-t" id="ch-t"></div><div class="ch-s" id="ch-s">tap to open</div></div>
            <div class="ch-acts">
                <button class="ib" onclick="toggleSelect()" title="Select messages"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L21 8l-9 9z"/></svg></button>
                <button class="ib" onclick="toggleSearch()" title="Search"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button>
                <button class="ib" onclick="openLockModal()" title="Lock chat"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg></button>
                <button class="ib" onclick="getAISummary()" title="AI Summary"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></button>
            </div>
        </div>
        <div id="sel-bar">
            <span id="sel-count">0 selected</span>
            <button onclick="deleteSelected()">🗑️ Delete selected</button>
            <button class="danger" onclick="clearChat()">🧹 Clear all</button>
            <button onclick="toggleSelect()" style="margin-left:auto;">✕ Cancel</button>
        </div>
        <div id="smsg-bar">
            <input type="text" placeholder="Search messages..." oninput="searchMsgs(this.value)"/>
            <button class="ib" onclick="toggleSearch()">✕</button>
        </div>
        <div id="msgs"></div>
        <div class="typ" id="typ"></div>
        <div id="reply-bar">
            <div class="ri2" id="ri2"></div>
            <button onclick="cancelReply()">✕</button>
        </div>
        <div id="inp-area">
            <div class="ew">
                <button class="att-btn" onclick="toggleEmoji()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg></button>
                <div id="ep"><div class="egrid" id="egrid"></div></div>
            </div>
            <input type="file" id="file-input" style="display:none" onchange="uploadFile(this)"/>
            <button class="att-btn" onclick="document.getElementById('file-input').click()" title="Attach file"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg></button>
            <button class="att-btn" id="rec-btn" onclick="toggleRecording()" title="Voice message"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg></button>
            <textarea id="mi" rows="1" placeholder="Type a message..."
                      oninput="autoResize(this);handleTyping()"
                      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
            <button class="sbtn" onclick="sendMsg()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
        </div>
    </div>

    <!-- VAULT PANEL -->
    <div id="vault">
        <div id="vt-header">
            <svg style="width:22px;height:22px;fill:var(--or)" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>
            <h2>My Vault</h2>
            <button class="ib" onclick="loadVault()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></button>
        </div>
        <div class="vt-tabs">
            <button class="vt-tab active" id="vtt-all" onclick="switchVaultTab('all')">All</button>
            <button class="vt-tab" id="vtt-note" onclick="switchVaultTab('note')">📝 Notes</button>
            <button class="vt-tab" id="vtt-file" onclick="switchVaultTab('file')">📁 Files</button>
            <button class="vt-tab" id="vtt-schedule" onclick="switchVaultTab('schedule')">⏰ Schedule</button>
            <button class="vt-tab" id="vtt-timer" onclick="switchVaultTab('timer')">⚡ Tasks</button>
        </div>
        <div id="vt-content">
            <div id="vt-add-form"></div>
            <div id="vt-items"></div>
        </div>
    </div>

</div>

<script>
    const EMOJIS=['😀','😂','😍','🥰','😎','🤔','😢','😡','👍','👎','❤️','🔥','🎉','💯','✅','🙏','😭','🤣','😊','😏','🫡','🤩','💀','😤','🥹','😴','🤓','👀','💬','🚀','⭐','💎','🎯','🏆','💡','🔐'];
    const REACTS=['❤️','😂','😮','😢','😡','👍'];

    let cu=null,ct=null,cr=null,cav=null;
    let sc=null,typSub=null,seenSub=null,editSub=null,delSub=null,clearSub=null,snapSub=null,presSub=null;
    let stompClient=null,typTO=null,allRooms=[],replyTo=null,isLogin=true;
    let selectMode=false,selectedIds=new Set();
    let mediaRec=null,audioChunks=[],isRecording=false;
    let currentVaultTab='all',currentSnapId=null;

    // OAuth redirect check
    (()=>{
      const p=new URLSearchParams(location.search);
      if(p.get('token')){
        ct=p.get('token'); cu=p.get('username'); cav=p.get('avatarUrl')||null;
        localStorage.setItem('ct',ct); localStorage.setItem('cu',cu);
        if(cav) localStorage.setItem('cav',cav);
        history.replaceState({},'','/');
        enterApp({username:cu,avatarUrl:cav,avatarColor:'#E8622A'});
      }
    })();

    function swTab(m){
      isLogin=m==='login';
      document.getElementById('tl').classList.toggle('active',isLogin);
      document.getElementById('tr2').classList.toggle('active',!isLogin);
      document.getElementById('ab').textContent=isLogin?'Login':'Register';
    }

    async function doAuth(){
      const u=document.getElementById('au').value.trim(), p=document.getElementById('ap').value.trim();
      if(!u||!p)return showErr('Fill all fields');
      const res=await fetch(isLogin?'/api/auth/login':'/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
      const d=await res.json();
      if(d.error)return showErr(d.error);
      ct=d.token; cu=d.username;
      localStorage.setItem('ct',ct); localStorage.setItem('cu',cu);
      enterApp(d);
    }

    function showErr(m){const e=document.getElementById('aerr');e.textContent=m;e.style.display='block';}

    function enterApp(d){
      document.getElementById('auth-screen').style.display='none';
      document.getElementById('app').style.display='flex';
      const av=document.getElementById('my-av');
      if(d.avatarUrl){av.innerHTML=`<img src="${d.avatarUrl}"/>`; cav=d.avatarUrl;}
      else{av.textContent=cu[0].toUpperCase();av.style.background=d.avatarColor||'#E8622A';}
      initEmoji(); connectWS(); loadRooms();
      applyTheme(localStorage.getItem('cth')||'dark');
    }

    function logout(){
      if(stompClient){stompClient.send('/app/online',{},JSON.stringify({username:cu,online:false}));stompClient.disconnect();}
      localStorage.clear(); location.reload();
    }

    function connectWS(){
      stompClient=Stomp.over(new SockJS('/ws'));
      stompClient.debug=null;
      stompClient.connect({},()=>{
        stompClient.send('/app/online',{},JSON.stringify({username:cu,online:true}));
        presSub=stompClient.subscribe('/topic/presence',pl=>{
          const d=JSON.parse(pl.body);
          if(cr&&d.username!==cu) document.getElementById('ch-s').textContent=d.online?`${d.username} is online`:'';
        });
      });
    }

    function H(){return{'Content-Type':'application/json','Authorization':'Bearer '+ct};}

    async function loadRooms(){
      const r=await fetch('/api/rooms',{headers:H()});
      allRooms=await r.json(); renderRooms(allRooms);
    }

    function renderRooms(rooms){
      const list=document.getElementById('room-list'); list.innerHTML='';
      rooms.forEach(r=>{
        const d=document.createElement('div');
        d.className='ri'+(cr===r.name?' active':''); d.id='rm-'+r.name;
        const c=sCol(r.name);
        d.innerHTML=`<div class="r-av" style="background:${c}">${r.name[0].toUpperCase()}${r.locked?'<span class="lock-badge">🔒</span>':''}</div>
          <div class="r-meta"><div class="r-nr"><span class="r-name">${r.name}</span><span class="r-time" id="rt-${r.name}"></span></div>
          <div class="r-prev" id="rp-${r.name}">No messages yet</div></div>`;
        d.onclick=()=>tryOpenRoom(r.name,r.locked);
        list.appendChild(d);
      });
    }

    function filterRooms(q){renderRooms(allRooms.filter(r=>r.name.toLowerCase().includes(q.toLowerCase())));}

    async function createRoom(){
      const n=document.getElementById('nr-inp').value.trim(); if(!n)return;
      await fetch('/api/rooms',{method:'POST',headers:H(),body:JSON.stringify({name:n,createdBy:cu})});
      document.getElementById('nr-inp').value='';
      await loadRooms(); tryOpenRoom(n,false);
    }

    async function tryOpenRoom(name,locked){
      if(locked){
        document.getElementById('unlock-modal').classList.add('open');
        document.getElementById('unlock-modal').dataset.room=name;
        document.getElementById('unlock-pw').value='';
        setTimeout(()=>document.getElementById('unlock-pw').focus(),100);
        return;
      }
      openRoom(name);
    }

    async function doUnlock(){
      const modal=document.getElementById('unlock-modal');
      const room=modal.dataset.room;
      const pw=document.getElementById('unlock-pw').value;
      const r=await fetch(`/api/rooms/${room}/verify`,{method:'POST',headers:H(),body:JSON.stringify({password:pw})});
      const d=await r.json();
      if(d.success){modal.classList.remove('open'); openRoom(room);}
      else{document.getElementById('unlock-pw').style.borderColor='#ff7055'; setTimeout(()=>document.getElementById('unlock-pw').style.borderColor='',1500);}
    }
    function closeUnlockModal(){document.getElementById('unlock-modal').classList.remove('open');}

    function openLockModal(){
      document.getElementById('lock-pw').value='';
      document.getElementById('lock-modal').classList.add('open');
      setTimeout(()=>document.getElementById('lock-pw').focus(),100);
    }
    function closeLockModal(){document.getElementById('lock-modal').classList.remove('open');}
    async function saveLock(){
      const pw=document.getElementById('lock-pw').value;
      await fetch(`/api/rooms/${cr}/lock`,{method:'POST',headers:H(),body:JSON.stringify({password:pw})});
      closeLockModal(); await loadRooms();
    }

    async function openRoom(roomName){
      cr=roomName; replyTo=null; selectMode=false; selectedIds.clear();
      document.getElementById('reply-bar').style.display='none';
      document.getElementById('sel-bar').style.display='none';
      document.getElementById('no-room').style.display='none';
      document.getElementById('ch-header').style.display='flex';
      document.getElementById('msgs').style.display='flex';
      document.getElementById('msgs').style.flexDirection='column';
      document.getElementById('inp-area').style.display='flex';

      const c=sCol(roomName);
      document.getElementById('ch-av').textContent=roomName[0].toUpperCase();
      document.getElementById('ch-av').style.background=c;
      document.getElementById('ch-t').textContent=roomName;

      document.querySelectorAll('.ri').forEach(el=>el.classList.remove('active'));
      document.getElementById('rm-'+roomName)?.classList.add('active');

      [sc,typSub,seenSub,editSub,delSub,clearSub,snapSub].forEach(s=>s?.unsubscribe());

      sc=stompClient.subscribe(`/topic/room/${roomName}`,pl=>{
        const d=JSON.parse(pl.body);
        if(d.type==='reaction') updateReacts(d.message);
        else{appendMsg(d); updPreview(roomName,d);}
      });
      typSub=stompClient.subscribe(`/topic/typing/${roomName}`,pl=>{
        const d=JSON.parse(pl.body);
        if(d.username!==cu) document.getElementById('typ').textContent=d.typing?`${d.username} is typing...`:'';
      });
      seenSub=stompClient.subscribe(`/topic/seen/${roomName}`,pl=>updSeenTick(JSON.parse(pl.body)));
      editSub=stompClient.subscribe(`/topic/edit/${roomName}`,pl=>updMsgContent(JSON.parse(pl.body)));
      delSub=stompClient.subscribe(`/topic/delete/${roomName}`,pl=>updMsgContent(JSON.parse(pl.body)));
      clearSub=stompClient.subscribe(`/topic/clear/${roomName}`,()=>{document.getElementById('msgs').innerHTML='';});
      snapSub=stompClient.subscribe(`/topic/snap/${roomName}`,pl=>{
        const d=JSON.parse(pl.body);
        const el=document.getElementById('msg-'+d.id);
        if(el){const ov=el.querySelector('.snap-overlay');if(ov)ov.textContent='👁️ Viewed';}
      });

      document.getElementById('msgs').innerHTML='';
      const res=await fetch(`/api/messages/${roomName}`,{headers:H()});
      const msgs=await res.json();
      msgs.forEach(m=>appendMsg(m));
      scrollBot();
    }

    function sendMsg(){
      const inp=document.getElementById('mi');
      const content=inp.value.trim();
      if(!content||!cr||!stompClient)return;
      const snapCheck=document.getElementById('snap-check');
      const isSnap=snapCheck&&snapCheck.checked;
      stompClient.send('/app/sendMessage',{},JSON.stringify({sender:cu,content,roomName:cr,replyToId:replyTo?.id?.toString(),snapView:isSnap}));
      inp.value=''; inp.style.height='auto';
      cancelReply(); stopTyping();
    }

    async function uploadFile(input){
      const file=input.files[0]; if(!file)return;
      const fd=new FormData(); fd.append('file',file);
      const res=await fetch('/api/files/upload',{method:'POST',headers:{'Authorization':'Bearer '+ct},body:fd});
      const d=await res.json();
      if(d.success){
        stompClient.send('/app/sendMessage',{},JSON.stringify({
          sender:cu,content:d.name,roomName:cr,fileUrl:d.url,fileType:d.type,fileName:d.name
        }));
      }
      input.value='';
    }

    async function toggleRecording(){
      const btn=document.getElementById('rec-btn');
      if(!isRecording){
        try{
          const stream=await navigator.mediaDevices.getUserMedia({audio:true});
          mediaRec=new MediaRecorder(stream); audioChunks=[];
          mediaRec.ondataavailable=e=>audioChunks.push(e.data);
          mediaRec.onstop=async()=>{
            const blob=new Blob(audioChunks,{type:'audio/webm'});
            const fd=new FormData(); fd.append('file',blob,'voice.webm');
            const res=await fetch('/api/files/upload',{method:'POST',headers:{'Authorization':'Bearer '+ct},body:fd});
            const d=await res.json();
            if(d.success) stompClient.send('/app/sendMessage',{},JSON.stringify({sender:cu,content:'🎤 Voice message',roomName:cr,fileUrl:d.url,fileType:'audio',fileName:'voice.webm'}));
            stream.getTracks().forEach(t=>t.stop());
          };
          mediaRec.start(); isRecording=true;
          btn.classList.add('recording');
          btn.title='Stop recording';
        }catch(e){alert('Microphone access denied');}
      } else {
        mediaRec.stop(); isRecording=false;
        btn.classList.remove('recording');
        btn.title='Voice message';
      }
    }

    function appendMsg(msg){
      const wrap=document.getElementById('msgs');
      if(document.getElementById('msg-'+msg.id)){updMsgContent(msg);return;}
      const isMine=msg.sender===cu;
      const div=document.createElement('div');
      div.id='msg-'+msg.id; div.className='msg-row';

      let inner='';
      if(msg.replyToId) inner+=`<div class="rp">↩ Replying to a message</div>`;
      if(!isMine) inner+=`<div class="msn">${msg.sender}</div>`;

      if(msg.deleted){
        inner+=`<div class="mdel">🚫 This message was deleted</div>`;
      } else if(msg.fileType==='image'&&msg.fileUrl){
        if(msg.snapView&&!msg.snapViewed){
          inner+=`<div class="snap-bubble"><img class="img-bubble snap-img" src="${msg.fileUrl}" style="filter:blur(20px);pointer-events:none"/><div class="snap-overlay" onclick="viewSnap(${msg.id},'${msg.fileUrl}')">👁️ Tap to view once</div></div>`;
        } else if(msg.snapView&&msg.snapViewed){
          inner+=`<div style="padding:8px;color:var(--ts);font-style:italic;font-size:13px;">👁️ Snap already viewed</div>`;
        } else {
          inner+=`<img class="img-bubble" src="${msg.fileUrl}" onclick="window.open('${msg.fileUrl}')"/>`;
        }
      } else if(msg.fileType==='audio'&&msg.fileUrl){
        inner+=`<audio class="audio-bubble" controls src="${msg.fileUrl}"></audio>`;
      } else if(msg.fileUrl){
        inner+=`<div class="file-bubble" onclick="window.open('${msg.fileUrl}')"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg><span style="font-size:13px;color:var(--tp)">${msg.fileName||msg.content}</span></div>`;
      } else {
        inner+=`<span class="mc">${escH(msg.content)}</span>`;
      }

      const seen=msg.seenBy?msg.seenBy.split(',').filter(Boolean).length:0;
      const tickHtml=isMine?`<span class="mtk ${seen>0?'tks':''}">${seen>0?'✓✓':'✓'}</span>`:'';
      const editHtml=msg.edited&&!msg.deleted?`<span class="med">(edited)</span>`:'';
      inner+=`<div class="mft">${editHtml}<span class="mt">${msg.formattedTime||''}</span>${tickHtml}</div>`;
      inner+=`<div class="mrc" id="rc-${msg.id}">${buildReacts(msg)}</div>`;

      if(!msg.deleted){
        inner+=`<div class="ma">
          <div class="mab" onclick="setReply(${msg.id},'${escJ(msg.sender)}','${escJ(msg.content)}')">↩ Reply</div>
          ${REACTS.map(e=>`<div class="mab" onclick="sendReact(${msg.id},'${e}')">${e}</div>`).join('')}
          ${isMine?`<div class="mab" onclick="startEdit(${msg.id},'${escJ(msg.content)}')">✏️ Edit</div>`:''}
          ${isMine?`<div class="mab danger" onclick="delMsg(${msg.id})">🗑️ Delete</div>`:''}
          <div class="mab" onclick="starMsg(${msg.id})">⭐ Star</div>
        </div>`;
      }

      const starC=msg.starred?' starred':'';
      div.innerHTML=`<div class="mb ${isMine?'mine':'other'}${starC}" style="position:relative;" onclick="handleMsgClick(${msg.id},event)">${inner}</div>`;
      wrap.appendChild(div);
      if(!isMine&&msg.id) setTimeout(()=>stompClient?.send('/app/seen',{},JSON.stringify({messageId:msg.id,username:cu})),800);
      scrollBot();
      updPreview(cr,msg);
    }

    function handleMsgClick(id,e){
      if(!selectMode||e.target.closest('.ma'))return;
      const el=document.getElementById('msg-'+id);
      if(!el)return;
      const bubble=el.querySelector('.mb');
      if(selectedIds.has(id)){selectedIds.delete(id);bubble.classList.remove('selected');}
      else{selectedIds.add(id);bubble.classList.add('selected');}
      document.getElementById('sel-count').textContent=selectedIds.size+' selected';
    }

    function toggleSelect(){
      selectMode=!selectMode; selectedIds.clear();
      document.getElementById('sel-bar').style.display=selectMode?'flex':'none';
      document.querySelectorAll('.mb').forEach(b=>{b.classList.remove('selected');b.style.cursor=selectMode?'pointer':'';});
      if(!selectMode) document.getElementById('sel-count').textContent='0 selected';
    }

    async function deleteSelected(){
      if(!selectedIds.size)return;
      await fetch('/api/messages/delete-selected',{method:'POST',headers:H(),body:JSON.stringify({ids:[...selectedIds],username:cu})});
      selectedIds.forEach(id=>{const el=document.getElementById('msg-'+id);if(el){const b=el.querySelector('.mb');if(b)b.innerHTML=`<div class="mdel">🚫 This message was deleted</div>`;}});
      selectedIds.clear(); toggleSelect();
    }

    async function clearChat(){
      if(!confirm('Clear entire chat? This cannot be undone.'))return;
      await fetch(`/api/rooms/${cr}/clear?username=${cu}`,{method:'DELETE',headers:H()});
      document.getElementById('msgs').innerHTML='';
      toggleSelect();
    }

    function viewSnap(id,url){
      currentSnapId=id;
      document.getElementById('snap-img').src=url;
      document.getElementById('snap-view').classList.add('open');
    }
    async function closeSnap(){
      document.getElementById('snap-view').classList.remove('open');
      document.getElementById('snap-img').src='';
      if(currentSnapId){
        await fetch(`/api/messages/${currentSnapId}/snap-viewed`,{method:'PUT',headers:H()});
        const el=document.getElementById('msg-'+currentSnapId);
        if(el){const ov=el.querySelector('.snap-overlay');if(ov)ov.textContent='👁️ Viewed';}
        currentSnapId=null;
      }
    }

    function buildReacts(msg){
      if(!msg.reactions||!msg.reactions.length)return'';
      const c={};
      msg.reactions.forEach(r=>{const[,e]=r.split(':');c[e]=(c[e]||0)+1;});
      return Object.entries(c).map(([e,n])=>`<span class="rchip" onclick="sendReact(${msg.id},'${e}')">${e} ${n}</span>`).join('');
    }

    function updMsgContent(msg){
      const el=document.getElementById('msg-'+msg.id); if(!el)return;
      const b=el.querySelector('.mb'); if(!b)return;
      if(msg.deleted){
        const ft=b.querySelector('.mft');
        b.innerHTML=`<div class="mdel">🚫 This message was deleted</div>${ft?ft.outerHTML:''}`;
        return;
      }
      const mc=b.querySelector('.mc'); if(mc) mc.textContent=msg.content;
      const re=document.getElementById('rc-'+msg.id); if(re) re.innerHTML=buildReacts(msg);
      b.classList.toggle('starred',!!msg.starred);
    }

    function updateReacts(msg){const re=document.getElementById('rc-'+msg.id);if(re)re.innerHTML=buildReacts(msg);}
    function updSeenTick(msg){const el=document.getElementById('msg-'+msg.id);if(!el)return;const t=el.querySelector('.mtk');if(t){t.textContent='✓✓';t.classList.add('tks');}}
    function sendReact(id,e){stompClient.send('/app/react',{},JSON.stringify({messageId:id.toString(),username:cu,emoji:e}));}
    function setReply(id,s,c){replyTo={id,sender:s,content:c};document.getElementById('reply-bar').style.display='flex';document.getElementById('ri2').textContent=`↩ ${s}: ${c.substring(0,50)}`;document.getElementById('mi').focus();}
    function cancelReply(){replyTo=null;document.getElementById('reply-bar').style.display='none';}

    let editingId=null;
    function startEdit(id,c){editingId=id;const i=document.getElementById('mi');i.value=c;i.focus();i.style.borderColor='var(--or)';}

    async function delMsg(id){
      const r=await fetch(`/api/messages/${id}/delete`,{method:'PUT',headers:H(),body:JSON.stringify({username:cu})});
      const d=await r.json(); if(d.success) updMsgContent(d.message);
    }

    async function starMsg(id){
      const r=await fetch(`/api/messages/${id}/star`,{method:'PUT',headers:H(),body:JSON.stringify({username:cu})});
      const d=await r.json();
      if(d.success){const el=document.getElementById('msg-'+id);if(el)el.querySelector('.mb')?.classList.toggle('starred',d.starred);}
    }

    function handleTyping(){
      const inp=document.getElementById('mi');
      if(editingId){
        clearTimeout(typTO);
        typTO=setTimeout(async()=>{
          const c=inp.value.trim(); if(!c){editingId=null;inp.style.borderColor='';return;}
          const id=editingId; editingId=null; inp.style.borderColor='';
          const r=await fetch(`/api/messages/${id}/edit`,{method:'PUT',headers:H(),body:JSON.stringify({content:c,username:cu})});
          const d=await r.json(); if(d.success) updMsgContent(d.message);
          inp.value=''; inp.style.height='auto';
        },900);
        return;
      }
      if(!stompClient||!cr)return;
      stompClient.send('/app/typing',{},JSON.stringify({username:cu,roomName:cr,typing:true}));
      clearTimeout(typTO); typTO=setTimeout(stopTyping,2000);
    }

    function stopTyping(){if(stompClient&&cr)stompClient.send('/app/typing',{},JSON.stringify({username:cu,roomName:cr,typing:false}));}

    function toggleSearch(){const b=document.getElementById('smsg-bar');b.style.display=b.style.display==='flex'?'none':'flex';if(b.style.display==='flex')b.querySelector('input').focus();}

    async function searchMsgs(q){
      if(!cr||q.length<2)return;
      const r=await fetch(`/api/messages/${cr}/search?q=${encodeURIComponent(q)}`,{headers:H()});
      const msgs=await r.json();
      document.getElementById('msgs').innerHTML='';
      msgs.forEach(m=>appendMsg(m));
    }

    async function getAISummary(){
      document.getElementById('ai-modal').classList.add('open');
      document.getElementById('ai-text').textContent='Generating...';
      const r=await fetch(`/api/messages/${cr}`,{headers:H()});
      const msgs=await r.json();
      if(!msgs.length){document.getElementById('ai-text').textContent='No messages to summarize.';return;}
      const txt=msgs.slice(-20).filter(m=>!m.deleted&&!m.fileUrl).map(m=>`${m.sender}: ${m.content}`).join('\n');
      try{
        const ar=await fetch('/api/ai/summarize',{method:'POST',headers:H(),body:JSON.stringify({messages:txt})});
        const d=await ar.json();
        document.getElementById('ai-text').textContent=d.error?'❌ '+d.error:d.summary;
      }catch(e){document.getElementById('ai-text').textContent='AI service unavailable.';}
    }

    function updPreview(r,msg){
      const p=document.getElementById('rp-'+r),t=document.getElementById('rt-'+r);
      if(p) p.textContent=msg.deleted?'Message deleted':msg.fileType?`📎 ${msg.fileName||'File'}`:msg.content?`${msg.sender}: ${msg.content}`:'';
      if(t) t.textContent=msg.formattedTime||'';
    }

    // ── VAULT ──
    function switchNav(tab){
      document.getElementById('nav-chat').classList.toggle('active',tab==='chat');
      document.getElementById('nav-vault').classList.toggle('active',tab==='vault');
      document.getElementById('chat-area').style.display=tab==='chat'?'flex':'none';
      const v=document.getElementById('vault');
      v.classList.toggle('open',tab==='vault');
      if(tab==='vault') loadVault();
    }

    async function loadVault(){
      const items=await(await fetch(`/api/vault/${cu}`,{headers:H()})).json();
      renderVaultItems(items);
      renderVaultForm(currentVaultTab);
    }

    function switchVaultTab(tab){
      currentVaultTab=tab;
      document.querySelectorAll('.vt-tab').forEach(t=>t.classList.remove('active'));
      document.getElementById('vtt-'+tab).classList.add('active');
      loadVault();
    }

    function renderVaultForm(tab){
      const f=document.getElementById('vt-add-form');
      if(tab==='note'||tab==='all'){
        f.innerHTML=`<div class="vt-add">
          <input id="vf-title" placeholder="Note title..."/>
          <textarea id="vf-content" rows="2" placeholder="Note content..." style="resize:none;"></textarea>
          <button onclick="addVaultNote()">+ Note</button>
        </div>`;
      } else if(tab==='schedule'){
        f.innerHTML=`<div class="vt-add" style="flex-wrap:wrap;gap:6px;">
          <input id="vf-title" placeholder="Message to schedule..." style="flex:1;min-width:200px;"/>
          <input id="vf-room" placeholder="Room name" style="max-width:140px;"/>
          <input id="vf-time" type="datetime-local" style="max-width:180px;"/>
          <button onclick="addVaultSchedule()">+ Schedule</button>
        </div>`;
      } else if(tab==='timer'){
        f.innerHTML=`<div class="vt-add">
          <input id="vf-title" placeholder="Task title..."/>
          <input id="vf-content" placeholder="Description (optional)"/>
          <button onclick="addVaultTimer()">+ Task</button>
        </div>`;
      } else if(tab==='file'){
        f.innerHTML=`<div class="vt-add">
          <input type="file" id="vf-file" style="flex:1;padding:8px;border:1.5px solid var(--bd);border-radius:9px;background:var(--bg3);color:var(--tp);"/>
          <button onclick="uploadVaultFile()">+ Upload</button>
        </div>`;
      } else {
        f.innerHTML='';
      }
    }

    function renderVaultItems(items){
      const c=document.getElementById('vt-items'); c.innerHTML='';
      const filtered=currentVaultTab==='all'?items:items.filter(i=>i.type===currentVaultTab);
      if(!filtered.length){c.innerHTML=`<div style="text-align:center;color:var(--ts);padding:30px;font-size:14px;">Nothing here yet</div>`;return;}
      filtered.forEach(item=>{
        const d=document.createElement('div');
        d.className='vcard'+(item.completed?' done':'');
        const icons={note:'📝',file:'📁',schedule:'⏰',timer:'⚡'};
        let sub='';
        if(item.type==='note') sub=item.content||'';
        else if(item.type==='file') sub=`<a href="${item.fileUrl}" target="_blank" style="color:var(--or)">Open file</a>`;
        else if(item.type==='schedule') sub=`Room: ${item.scheduledRoom||'—'} | ${item.scheduledAt?new Date(item.scheduledAt).toLocaleString():'No time set'}`;
        else if(item.type==='timer') sub=item.content||'';
        d.innerHTML=`<div class="vc-icon">${icons[item.type]||'📄'}</div>
          <div class="vc-body">
            <div class="vc-title">${escH(item.title||'Untitled')}</div>
            <div class="vc-sub">${sub}</div>
            <div class="vc-acts">
              ${item.type==='timer'?`<button class="vc-btn" onclick="toggleTask(${item.id})">${item.completed?'↩ Undo':'✓ Done'}</button>`:''}
              ${item.type==='schedule'&&!item.sent?`<button class="vc-btn" onclick="sendScheduledNow(${item.id},'${escJ(item.title)}','${escJ(item.scheduledRoom)}')">▶ Send now</button>`:''}
            </div>
          </div>
          <button class="vc-del" onclick="delVaultItem(${item.id})">🗑️</button>`;
        c.appendChild(d);
      });
    }

    async function addVaultNote(){
      const t=document.getElementById('vf-title')?.value.trim();
      const c=document.getElementById('vf-content')?.value.trim();
      if(!t)return;
      await fetch('/api/vault/note',{method:'POST',headers:H(),body:JSON.stringify({owner:cu,title:t,content:c})});
      loadVault();
    }

    async function addVaultSchedule(){
      const t=document.getElementById('vf-title')?.value.trim();
      const room=document.getElementById('vf-room')?.value.trim();
      const time=document.getElementById('vf-time')?.value;
      if(!t)return;
      await fetch('/api/vault/schedule',{method:'POST',headers:H(),body:JSON.stringify({owner:cu,title:t,room,scheduledAt:time?new Date(time).toISOString().slice(0,19):null})});
      loadVault();
    }

    async function addVaultTimer(){
      const t=document.getElementById('vf-title')?.value.trim();
      const c=document.getElementById('vf-content')?.value.trim();
      if(!t)return;
      await fetch('/api/vault/timer',{method:'POST',headers:H(),body:JSON.stringify({owner:cu,title:t,content:c})});
      loadVault();
    }

    async function uploadVaultFile(){
      const fi=document.getElementById('vf-file'); if(!fi.files[0])return;
      const fd=new FormData(); fd.append('file',fi.files[0]); fd.append('owner',cu);
      await fetch('/api/vault/file',{method:'POST',headers:{'Authorization':'Bearer '+ct},body:fd});
      loadVault();
    }

    async function toggleTask(id){
      await fetch(`/api/vault/${id}/complete`,{method:'PUT',headers:H(),body:JSON.stringify({owner:cu})});
      loadVault();
    }

    async function delVaultItem(id){
      await fetch(`/api/vault/${id}?owner=${cu}`,{method:'DELETE',headers:H()});
      loadVault();
    }

    async function sendScheduledNow(id,content,room){
      if(!room)return alert('No room set for this scheduled message');
      stompClient.send('/app/sendMessage',{},JSON.stringify({sender:cu,content,roomName:room}));
      await fetch(`/api/vault/${id}?owner=${cu}`,{method:'DELETE',headers:H()});
      loadVault();
    }

    // ── PROFILE ──
    function openProfile(){
      document.getElementById('pp-nm').textContent=cu;
      document.getElementById('pp-un').textContent='@'+cu;
      const a=document.getElementById('pp-av');
      if(cav) a.innerHTML=`<img src="${cav}"/>`;
      else{a.textContent=cu[0].toUpperCase();a.style.background='var(--or)';}
      document.getElementById('pp').classList.add('open');
    }
    async function saveProfile(){
      const s=document.getElementById('pp-st').value;
      await fetch('/api/auth/profile',{method:'PUT',headers:H(),body:JSON.stringify({username:cu,statusMessage:s})});
      document.getElementById('pp').classList.remove('open');
    }

    // ── EMOJI ──
    function initEmoji(){
      const g=document.getElementById('egrid');
      EMOJIS.forEach(e=>{const b=document.createElement('span');b.className='eb';b.textContent=e;b.onclick=()=>{document.getElementById('mi').value+=e;document.getElementById('ep').classList.remove('open');};g.appendChild(b);});
    }
    function toggleEmoji(){document.getElementById('ep').classList.toggle('open');}
    document.addEventListener('click',e=>{if(!e.target.closest('.ew'))document.getElementById('ep').classList.remove('open');});

    // ── THEME ──
    function applyTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('cth',t);}
    function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}

    // ── UTILS ──
    function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}
    function scrollBot(){const w=document.getElementById('msgs');w.scrollTop=w.scrollHeight;}
    function sCol(s){const c=['#E8622A','#D4A853','#6B8E6B','#5B8DB8','#9B6B9B','#B87355','#7A8B7A','#C47A55'];let h=0;for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return c[Math.abs(h)%c.length];}
    function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    function escJ(s){return String(s||'').replace(/'/g,"\\'").replace(/\n/g,'\\n');}

    // ── AUTO LOGIN ──
    const st=localStorage.getItem('ct'),su=localStorage.getItem('cu'),sa=localStorage.getItem('cav');
    if(st&&su){
      ct=st; cu=su; cav=sa||null;
      fetch('/api/rooms',{headers:H()}).then(r=>{if(r.ok)enterApp({username:su,avatarUrl:cav,avatarColor:'#E8622A'});});
    }
    applyTheme(localStorage.getItem('cth')||'dark');
</script>
</body>
</html>
