<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ChatApp</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
    <div class="a-logo">
        <div class="a-icon"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
        <h1>ChatApp</h1><p>Connect with anyone, anywhere</p>
    </div>
    <div class="a-tabs">
        <button class="a-tab active" id="tl" onclick="swTab('login')">Login</button>
        <button class="a-tab" id="tr2" onclick="swTab('register')">Register</button>
    </div>
    <div id="aerr" class="a-err"></div>
    <div class="a-field"><label>Username</label><input id="au" type="text" placeholder="Username" onkeydown="if(event.key==='Enter')doAuth()"/></div>
    <div class="a-field"><label>Password</label><input id="ap" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')doAuth()"/></div>
    <button class="a-btn" id="ab" onclick="doAuth()">Login</button>
    <div class="divider">or</div>
    <button class="g-btn" onclick="window.location.href='/oauth2/authorization/google'">
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
    </button>
</div>

<!-- APP -->
<div id="app">

    <!-- MODALS -->
    <div class="modal-bg" id="lock-modal">
        <div class="modal">
            <h3>🔐 Lock this chat</h3>
            <input id="lock-pw" type="password" placeholder="Set a password (leave empty to remove lock)"/>
            <div class="modal-btns">
                <button class="mb-cancel" onclick="closeLockModal()">Cancel</button>
                <button class="mb-ok" onclick="saveLock()">Save</button>
            </div>
        </div>
    </div>

    <div class="modal-bg" id="unlock-modal">
        <div class="modal">
            <h3>🔐 This chat is locked</h3>
            <input id="unlock-pw" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')doUnlock()"/>
            <div class="modal-btns">
                <button class="mb-cancel" onclick="closeUnlockModal()">Cancel</button>
                <button class="mb-ok" onclick="doUnlock()">Unlock</button>
            </div>
        </div>
    </div>

    <div id="ai-modal">
        <div class="ai-box">
            <h3>🤖 AI Chat Summary</h3>
            <p id="ai-text">Generating...</p>
            <button class="ai-close" onclick="document.getElementById('ai-modal').classList.remove('open')">Close</button>
        </div>
    </div>

    <div id="snap-view">
        <img id="snap-img" src="" alt="snap"/>
        <button id="snap-close" onclick="closeSnap()">✓ Seen — close</button>
    </div>

    <!-- PROFILE -->
    <div id="pp">
        <button class="pp-back" onclick="document.getElementById('pp').classList.remove('open')">←</button>
        <div class="pp-hdr">
            <div class="pp-av" id="pp-av"></div>
            <div class="pp-name" id="pp-nm"></div>
        </div>
        <div class="pp-body">
            <div class="pp-fld"><div class="pp-lbl">Username</div><div class="pp-val" id="pp-un"></div></div>
            <div class="pp-fld"><div class="pp-lbl">Status</div><input class="pp-inp" id="pp-st" placeholder="What's on your mind?"/></div>
            <div class="pp-fld">
                <div class="pp-lbl">Theme</div>
                <div class="tr">
                    <button class="tb" onclick="applyTheme('dark')">🌙 Dark</button>
                    <button class="tb" onclick="applyTheme('light')">☀️ Light</button>
                </div>
            </div>
            <button class="pp-save" onclick="saveProfile()">Save</button>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <div id="sb-top">
            <div class="sb-av" id="my-av" onclick="openProfile()"></div>
            <div class="sb-acts">
                <button class="ib" onclick="toggleTheme()" title="Theme"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg></button>
                <button class="ib" onclick="logout()" title="Logout"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg></button>
            </div>
        </div>
        <div id="sb-search"><div class="sw">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" placeholder="Search chats..." oninput="filterRooms(this.value)"/>
        </div></div>
        <div id="room-list"></div>
        <div id="add-room">
            <input id="nr-inp" placeholder="New room..." onkeydown="if(event.key==='Enter')createRoom()"/>
            <button onclick="createRoom()">+</button>
        </div>
        <div id="sb-nav">
            <button class="nav-tab active" id="nav-chat" onclick="switchNav('chat')">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>Chats
            </button>
            <button class="nav-tab" id="nav-vault" onclick="switchNav('vault')">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>Vault
            </button>
        </div>
    </div>

    <!-- CHAT AREA -->
    <div id="chat-area">
        <div id="no-room">
            <div class="nr-i"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
            <span style="font-size:15px;font-weight:500;">Select a chat</span>
            <span style="font-size:12px;">Your messages are private 🔒</span>
        </div>
        <div id="ch-header">
            <div class="ch-av" id="ch-av"></div>
            <div class="ch-info"><div class="ch-t" id="ch-t"></div><div class="ch-s" id="ch-s">tap to open</div></div>
            <div class="ch-acts">
                <button class="ib" onclick="toggleSelect()" title="Select messages"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L21 8l-9 9z"/></svg></button>
                <button class="ib" onclick="toggleSearch()" title="Search"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button>
                <button class="ib" onclick="openLockModal()" title="Lock chat"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg></button>
                <button class="ib" onclick="getAISummary()" title="AI Summary"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></button>
            </div>
        </div>
        <div id="sel-bar">
            <span id="sel-count">0 selected</span>
            <button onclick="deleteSelected()">🗑️ Delete selected</button>
            <button class="danger" onclick="clearChat()">🧹 Clear all</button>
            <button onclick="toggleSelect()" style="margin-left:auto;">✕ Cancel</button>
        </div>
        <div id="smsg-bar">
            <input type="text" placeholder="Search messages..." oninput="searchMsgs(this.value)"/>
            <button class="ib" onclick="toggleSearch()">✕</button>
        </div>
        <div id="msgs"></div>
        <div class="typ" id="typ"></div>
        <div id="reply-bar">
            <div class="ri2" id="ri2"></div>
            <button onclick="cancelReply()">✕</button>
        </div>
        <div id="inp-area">
            <div class="ew">
                <button class="att-btn" onclick="toggleEmoji()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg></button>
                <div id="ep"><div class="egrid" id="egrid"></div></div>
            </div>
            <input type="file" id="file-input" style="display:none" onchange="uploadFile(this)"/>
            <button class="att-btn" onclick="document.getElementById('file-input').click()" title="Attach file"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg></button>
            <button class="att-btn" id="rec-btn" onclick="toggleRecording()" title="Voice message"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg></button>
            <textarea id="mi" rows="1" placeholder="Type a message..."
                      oninput="autoResize(this);handleTyping()"
                      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
            <button class="sbtn" onclick="sendMsg()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
        </div>
    </div>

    <!-- VAULT PANEL -->
    <div id="vault">
        <div id="vt-header">
            <svg style="width:22px;height:22px;fill:var(--or)" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>
            <h2>My Vault</h2>
            <button class="ib" onclick="loadVault()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></button>
        </div>
        <div class="vt-tabs">
            <button class="vt-tab active" id="vtt-all" onclick="switchVaultTab('all')">All</button>
            <button class="vt-tab" id="vtt-note" onclick="switchVaultTab('note')">📝 Notes</button>
            <button class="vt-tab" id="vtt-file" onclick="switchVaultTab('file')">📁 Files</button>
            <button class="vt-tab" id="vtt-schedule" onclick="switchVaultTab('schedule')">⏰ Schedule</button>
            <button class="vt-tab" id="vtt-timer" onclick="switchVaultTab('timer')">⚡ Tasks</button>
        </div>
        <div id="vt-content">
            <div id="vt-add-form"></div>
            <div id="vt-items"></div>
        </div>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
